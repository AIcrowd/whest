site_name: mechestim

exclude_docs: |
  superpowers/
site_description: >-
  NumPy-compatible math primitives with FLOP counting.
  mechestim is NOT a drop-in NumPy replacement — every arithmetic
  operation is counted and charged against a FLOP budget.
site_url: https://aicrowd.github.io/mechestim/
repo_url: https://github.com/AIcrowd/mechestim

theme:
  name: material
  logo: assets/logo/logo.png
  favicon: assets/logo/logo.png
  palette:
    scheme: default
    primary: white
    accent: indigo
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - navigation.top
    - header.autohide

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
  - llmstxt-md:
      sections:
        "Getting Started":
          - getting-started/installation.md: "Install mechestim and verify setup"
          - getting-started/first-budget.md: "Create your first FLOP budget"
        "How-To Guides":
          - how-to/migrate-from-numpy.md: "Migrate existing NumPy code to mechestim"
          - how-to/use-einsum.md: "Einstein summation patterns and costs"
          - how-to/exploit-symmetry.md: "Save FLOPs via symmetry detection"
          - how-to/use-linalg.md: "Linear algebra operations and costs"
          - how-to/plan-your-budget.md: "Query FLOP costs before executing"
          - how-to/debug-budget-overruns.md: "Diagnose and fix budget overruns"
        "Concepts":
          - concepts/flop-counting-model.md: "How FLOP costs are computed analytically"
          - concepts/operation-categories.md: "Free vs counted vs blocked operations"
        "API Reference":
          - api/counted-ops.md: "Operations that cost FLOPs"
          - api/free-ops.md: "Operations that cost 0 FLOPs"
          - api/symmetric.md: "SymmetricTensor for symmetry-aware savings"
          - api/linalg.md: "Linear algebra module (SVD, Cholesky, QR, etc.)"
          - api/fft.md: "FFT module (fft, rfft, fftn, etc.)"
          - api/random.md: "Random number generation (all free, 0 FLOPs)"
          - api/polynomial.md: "Polynomial operations"
          - api/window.md: "Window functions (bartlett, hamming, etc.)"
          - api/budget.md: "BudgetContext and OpRecord classes"
          - api/flops.md: "Cost query functions (einsum_cost, svd_cost, etc.)"
          - api/errors.md: "Exception classes"
        "Reference":
          - reference/for-agents.md: "Guide for AI coding assistants — resources, rules, and common mistakes"
          - reference/operation-audit.md: "Complete 482-operation inventory with costs"
          - reference/cheat-sheet.md: "Quick FLOP cost reference for all operations"
        "Troubleshooting":
          - troubleshooting/common-errors.md: "Common errors and fixes"

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Your First Budget: getting-started/first-budget.md
  - How-To Guides:
    - Migrate from NumPy: how-to/migrate-from-numpy.md
    - Use Einsum: how-to/use-einsum.md
    - Exploit Symmetry: how-to/exploit-symmetry.md
    - Use Linear Algebra: how-to/use-linalg.md
    - Plan Your Budget: how-to/plan-your-budget.md
    - Debug Budget Overruns: how-to/debug-budget-overruns.md
  - Concepts:
    - FLOP Counting Model: concepts/flop-counting-model.md
    - Operation Categories: concepts/operation-categories.md
  - Architecture:
    - Client-Server Model: architecture/client-server.md
    - Running with Docker: architecture/docker.md
  - API Reference:
    - Counted Operations: api/counted-ops.md
    - Free Operations: api/free-ops.md
    - Symmetric Tensors: api/symmetric.md
    - Linear Algebra: api/linalg.md
    - FFT: api/fft.md
    - Random: api/random.md
    - Polynomial: api/polynomial.md
    - Window Functions: api/window.md
    - Budget: api/budget.md
    - FLOP Cost Query: api/flops.md
    - Errors: api/errors.md
  - Reference:
    - For AI Agents: reference/for-agents.md
    - Operation Audit: reference/operation-audit.md
    - FLOP Cost Cheat Sheet: reference/cheat-sheet.md
  - Troubleshooting: troubleshooting/common-errors.md
  - Changelog: changelog.md

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - tables
