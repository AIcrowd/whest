name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        numpy-version: ["2.0", "2.1", "2.2"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Set up Node.js (for JS cross-validation)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Pin NumPy ${{ matrix.numpy-version }}
        run: uv pip install 'numpy~=${{ matrix.numpy-version }}.0'

      - name: Run tests with coverage
        run: uv run pytest --cov=whest --cov-fail-under=85

      - name: NumPy compatibility tests
        if: matrix.numpy-version == '2.2'
        run: |
          uv run pytest tests/numpy_compat/ --pyargs numpy._core.tests.test_umath -n auto -q
          uv run pytest tests/numpy_compat/ --pyargs numpy._core.tests.test_ufunc -n auto -q
          uv run pytest tests/numpy_compat/ --pyargs numpy._core.tests.test_numeric -n auto -q \
            -k "not test_for_reference_leak"
          uv run pytest tests/numpy_compat/ --pyargs numpy.linalg.tests.test_linalg -n auto -q
          uv run pytest tests/numpy_compat/ --pyargs numpy.fft.tests.test_pocketfft -n auto -q
          uv run pytest tests/numpy_compat/ --pyargs numpy.fft.tests.test_helper -n auto -q
          uv run pytest tests/numpy_compat/ --pyargs numpy.polynomial.tests.test_polynomial -n auto -q
          uv run pytest tests/numpy_compat/ --pyargs numpy.random.tests.test_random -n auto -q

  client-server-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check generated files are in sync
        run: uv run python scripts/sync_client.py --check

      - name: Run parity tests
        run: uv run pytest tests/test_client_server_parity.py tests/test_serialization_parity.py -v

  client-server-integration:
    needs: [client-server-sync]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install core + server dependencies
        run: |
          uv sync --all-extras
          cd whest-server && uv sync

      - name: Run integration tests
        run: |
          cd whest-client && uv run pytest tests/test_full_integration.py -v --tb=short

  website-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: cd website && npm ci

      - name: Generate API data
        run: uv run python scripts/generate_api_docs.py

      - name: Run website regression tests
        run: cd website && npm test

      - name: Build website
        run: cd website && npm run build

      - name: Run GH Pages compatibility checks
        run: cd website && npm run check:gh-pages

  docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, test, website-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --all-extras

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: cd website && npm ci

      - name: Generate API data
        run: uv run python scripts/generate_api_docs.py

      - name: Verify generated API data
        run: uv run python scripts/generate_api_docs.py --verify

      - name: Build website
        run: cd website && npm run build

      - name: Run GH Pages compatibility checks
        run: cd website && npm run check:gh-pages

      - name: Verify deploy artifact contents
        run: |
          test -f website/out/.nojekyll
          test -f website/out/llms.txt
          test -f website/out/llms-full.txt
          test -f website/out/ops.json
          test -f website/out/api-data/ops/einsum.json
          test -f website/out/docs/development/calibration/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/out
          force_orphan: true
          enable_jekyll: false
