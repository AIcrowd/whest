version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    volumes:
      - whest-sock:/ipc
    restart: unless-stopped

  participant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.participant-hardened
    volumes:
      - whest-sock:/ipc
      - ./submissions:/submission:ro
    environment:
      - WHEST_SERVER_URL=ipc:///ipc/whest.sock
    depends_on:
      - backend
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=10m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 1.0
    pids_limit: 50

volumes:
  whest-sock:
